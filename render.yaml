services:
  - type: web
    name: mentorhub-frontend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://mentorhub-backend-ai.onrender.com/api
      - key: PORT
        value: 3000
